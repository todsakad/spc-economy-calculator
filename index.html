<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Economy Calculator</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; background: #121212; color: #e0e0e0; }
        .panel { background: #1e1e1e; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        input, select { margin: 5px; padding: 5px; background: #333; color: white; border: 1px solid #555; }
        button { padding: 8px 15px; background: #0066cc; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #005bb5; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    </style>
</head>
<body>

    <h1>Empire Economy Calculator</h1>
    
    <div class="panel">
        <h3>1. Planet Roster</h3>
        <div id="planet-container"></div>
        <button onclick="addPlanet()">+ Add Planet</button>
    </div>

    <div class="panel">
        <h3>2. Global Buffs</h3>
        <div class="grid">
            <label>Flat Basic Res/Planet: <input type="number" id="buff-flat-basic-planet" value="0"></label>
            <label>Flat Energy/Turn: <input type="number" id="buff-flat-energy-turn" value="0"></label>
            <label>% Basic Res/Planet: <input type="number" id="buff-pct-basic-planet" value="0"></label>
            <label>% Basic Res/Turn: <input type="number" id="buff-pct-basic-turn" value="0"></label>
        </div>
    </div>

    <div class="panel">
        <h3>3. Turn Production Output</h3>
        <button onclick="calculateEconomy()">Calculate Turn Output</button>
        <div id="output-display" style="margin-top: 15px; font-weight: bold; white-space: pre-wrap;"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
