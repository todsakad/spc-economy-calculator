<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economy Calculatorr</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 20px; max-width: 1400px; margin: auto; }
        .panel { background: #313244; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #89b4fa; border-bottom: 1px solid #45475a; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        button { background: #89b4fa; color: #11111b; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #b4befe; }
        button.danger { background: #f38ba8; }
        button.danger:hover { background: #eba0ac; }
        button.success { background: #a6e3a1; color: #11111b; font-size: 1.1em; padding: 12px; width: 100%; }
        button.success:hover { background: #94e2d5; }
        
        select, input { background: #181825; color: #cdd6f4; border: 1px solid #45475a; padding: 6px; border-radius: 4px; margin-right: 10px; }
        input[type="text"] { width: 150px; }
        input[type="number"] { width: 70px; }
        input[list] { width: 200px; }
        input[type="checkbox"] { margin-right: 5px; cursor: pointer; }

        /* Grouping & Modifiers Visuals */
        .mod-row { display: flex; align-items: center; background: #181825; padding: 8px; border-radius: 4px; margin-bottom: 8px; gap: 10px; flex-wrap: wrap; border-left: 2px solid #a6adc8; }
        .group-container { margin-bottom: 8px; padding: 5px 0; }
        .group-header { display: flex; align-items: center; gap: 10px; background: #45475a; padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #89b4fa; }
        .group-toggle { cursor: pointer; font-family: monospace; font-size: 1.2em; color: #89b4fa; width: 20px; text-align: center; user-select: none; }
        .group-header input { font-weight: bold; font-size: 1.05em; background: transparent; border: none; flex-grow: 1; padding: 0; margin: 0; box-shadow: none; outline: none; }
        .group-header input:focus { border-bottom: 1px solid #cdd6f4; border-radius: 0; }

        /* Layout stuff */
        .planet-card { background: #45475a; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 5px solid #89b4fa; }
        .planet-header { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
        .planet-mods { background: #313244; padding: 10px; border-radius: 4px; margin-top: 10px; }
        .checkbox-label { display: flex; align-items: center; font-size: 0.9em; color: #f5e0dc; background: #181825; padding: 4px 8px; border-radius: 4px; border: 1px solid #45475a; cursor: pointer; }
        .header-actions { display: flex; gap: 10px; margin-bottom: 20px; justify-content: flex-end; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #181825; border-radius: 6px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #313244; }
        th { background: #45475a; color: #cdd6f4; }
        .positive { color: #a6e3a1; font-weight: bold; }
        .negative { color: #f38ba8; font-weight: bold; }
        .neutral { color: #cdd6f4; }
    </style>
</head>
<body>

    <datalist id="modifier-options"></datalist>

    <div class="header-actions">
        <button onclick="saveData()">💾 Save Configuration</button>
        <button onclick="document.getElementById('file-upload').click()">📂 Load Configuration</button>
        <input type="file" id="file-upload" style="display:none" accept=".json" onchange="loadData(event)">
    </div>

    <div class="panel">
        <h2>Global Modifiers Organizer 
            <div>
                <button onclick="addGroup(null, 0)">+ Add Root Group</button>
                <button onclick="addGlobalModifier(null)">+ Add Loose Mod</button>
            </div>
        </h2>
        <div style="font-size: 0.85em; color: #a6adc8; margin-bottom: 15px;">Organize your tech, civics, and traditions here. Use negative values for Upkeep reduction (e.g., -10%).</div>
        <div id="global-mods-container"></div>
    </div>

    <div class="panel">
        <h2>Empire Planets <button onclick="addPlanet()">+ Add Planet</button></h2>

    </div>

    <div class="panel" style="background: #1e1e2e; border: 2px solid #89b4fa;">

    // --- 2. STATE MANAGEMENT ---
    let appState = {
        groups: [],
        globalModifiers: [],
        planets: []
    };

    function initDatalist() {
        const datalist = document.getElementById('modifier-options');
        let options = [];
        ['All', 'Basic', 'Abstract', 'Special', 'Strategic'].forEach(cat => { 
            options.push(`% ${cat}`); options.push(`Flat ${cat}`); 
            options.push(`% ${cat} Upkeep`); options.push(`Flat ${cat} Upkeep`);
        });
        ALL_RESOURCES.forEach(res => {
            let prettyName = res.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
            options.push(`% ${prettyName}`); options.push(`Flat ${prettyName}`);
            options.push(`% ${prettyName} Upkeep`); options.push(`Flat ${prettyName} Upkeep`);
        });
        datalist.innerHTML = options.map(opt => `<option value="${opt}"></option>`).join('');
    }

    function saveData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState, null, 2));
        const anchor = document.createElement('a');
        anchor.href = dataStr; anchor.download = "empire_save.json";
        document.body.appendChild(anchor); anchor.click(); anchor.remove();
    }

    function loadData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try { 
                let loadedState = JSON.parse(e.target.result); 
                if(!loadedState.groups) loadedState.groups = [];
                if(loadedState.globalModifiers) {
                    loadedState.globalModifiers.forEach(m => { if (m.parentId === undefined) m.parentId = null; });
                }
                if(loadedState.planets) {
                    loadedState.planets.forEach(p => { 
                        if (p.ignoreGlobalMods === undefined) p.ignoreGlobalMods = false; 
                        if (p.finalProdMulti === undefined) p.finalProdMulti = 100; // Legacy save support
                    });
                }
                appState = loadedState;
                renderApp(); 
            } 
            catch (err) { alert("Error loading valid JSON configuration."); }
        };
        reader.readAsText(file);
    }

    // --- 3. UI RENDERING & LOGIC ---
    
    function addGroup(parentId, level) {
        let groupName = prompt("Enter a name for the new group:", "New Group");
        if (!groupName) return; 
        
        appState.groups.push({ id: Date.now(), parentId, name: groupName, expanded: true, level });
        renderApp();
    }
    
    function updateGroup(id, field, value) {
        const group = appState.groups.find(g => g.id === id);
        if (group) group[field] = value;
    }
    
    function toggleGroup(id) {
        const group = appState.groups.find(g => g.id === id);
        if (group) { group.expanded = !group.expanded; renderApp(); }
    }
    
    function removeGroup(groupId) {
        let groupsToDelete = [groupId];
        let i = 0;
        while(i < groupsToDelete.length) {
            let currentId = groupsToDelete[i];
            let children = appState.groups.filter(g => g.parentId === currentId).map(g => g.id);
            groupsToDelete.push(...children);
            i++;
        }
        appState.groups = appState.groups.filter(g => !groupsToDelete.includes(g.id));
        appState.globalModifiers = appState.globalModifiers.filter(m => !groupsToDelete.includes(m.parentId));
        renderApp();
    }

    function addGlobalModifier(parentId) { 
        appState.globalModifiers.push({ id: Date.now(), parentId, name: "New Buff", type: "% Basic", value: 0, scope: "planet", target: "all" }); 
        renderApp(); 
    }
    
    function updateGlobalModifier(id, field, value) { 
        const mod = appState.globalModifiers.find(m => m.id === id); 
        if (mod) mod[field] = value; 
        renderApp(); 
    }
    
    function removeGlobalModifier(id) { 
        appState.globalModifiers = appState.globalModifiers.filter(m => m.id !== id); 
        renderApp(); 
    }

    function addPlanet() { 
        const id = Date.now(); 
        const firstType = Object.keys(PLANET_DATA)[0]; 
        const firstTier = Object.keys(PLANET_DATA[firstType])[0]; 
        appState.planets.push({ id, name: "New Planet", type: firstType, tier: firstTier, hab: "80-100", asc: 0, finalProdMulti: 100, ignoreGlobalMods: false, modifiers: [] }); 
        renderApp(); 
    }
    function updatePlanet(id, field, value) { 
        const p = appState.planets.find(p => p.id === id); 
        if (p) { 
            p[field] = value; 
            if (field === 'type') { 
                const validTiers = Object.keys(PLANET_DATA[value]); 
                if (!validTiers.includes(p.tier)) p.tier = validTiers[0]; 
            } 
            renderApp(); 
        } 
    }
    function removePlanet(id) { appState.planets = appState.planets.filter(p => p.id !== id); renderApp(); }
    function addLocalModifier(pId) { const p = appState.planets.find(p => p.id === pId); if(p) { p.modifiers.push({ id: Date.now(), name: "Local Buff", type: "% Basic", value: 0 }); renderApp(); } }
    function updateLocalModifier(pId, mId, field, value) { const p = appState.planets.find(p => p.id === pId); if(p) { const m = p.modifiers.find(m => m.id === mId); if(m) m[field] = value; renderApp(); } }
    function removeLocalModifier(pId, mId) { const p = appState.planets.find(p => p.id === pId); if(p) { p.modifiers = p.modifiers.filter(m => m.id !== mId); renderApp(); } }

    function generateTargetOptions(selectedTarget) {
        let opts = `<option value="all" ${selectedTarget === 'all' ? 'selected' : ''}>All Planets</option>`;

        return opts;
    }

                <div class="group-container" style="margin-left: ${indent}px;">
                    <div class="group-header">
                        <div class="group-toggle" onclick="toggleGroup(${g.id})">${g.expanded ? '▼' : '▶'}</div>
                        <input type="text" value="${g.name}" onchange="updateGroup(${g.id}, 'name', this.value)">
                        ${level < 2 ? `<button onclick="addGroup(${g.id}, ${level + 1})" style="padding:4px 8px; font-size:0.85em; background:#f5c2e7; color:#11111b;">+ Subgroup</button>` : ''}
                        <button onclick="addGlobalModifier(${g.id})" style="padding:4px 8px; font-size:0.85em;">+ Add Mod</button>
                        <button class="danger" onclick="removeGroup(${g.id})" style="padding:4px 8px; font-size:0.85em;">Delete</button>
                    </div>
                    <div style="display: ${g.expanded ? 'block' : 'none'}">
                        ${renderGroupTree(g.id, level + 1)}
                    </div>
                </div>
            `;
        });

        const childMods = appState.globalModifiers.filter(m => m.parentId === parentId);
        childMods.forEach(m => {
            const indent = level > 0 ? 30 : 0;
            html += `
                <div class="mod-row" style="margin-left: ${indent}px;">
                    <input type="text" value="${m.name}" onchange="updateGlobalModifier(${m.id}, 'name', this.value)" placeholder="Buff Name">
                    <select onchange="updateGlobalModifier(${m.id}, 'scope', this.value)">
                        <option value="planet" ${m.scope === 'planet' ? 'selected' : ''}>Per Planet</option>
                        <option value="turn" ${m.scope === 'turn' ? 'selected' : ''}>Per Turn (Empire)</option>
                    </select>
                    ${m.scope === 'planet' ? `<select onchange="updateGlobalModifier(${m.id}, 'target', this.value)">${generateTargetOptions(m.target)}</select>` : ''}
                    <input list="modifier-options" value="${m.type}" onchange="updateGlobalModifier(${m.id}, 'type', this.value)">
                    Value: <input type="number" value="${m.value}" onchange="updateGlobalModifier(${m.id}, 'value', parseFloat(this.value) || 0)">
                    <button class="danger" onclick="removeGlobalModifier(${m.id})">X</button>
                </div>
            `;
        });

        return html;
    }

    function renderApp() {
        const gContainer = document.getElementById('global-mods-container');
        gContainer.innerHTML = renderGroupTree(null, 0);

        if (appState.groups.length === 0 && appState.globalModifiers.length === 0) {
            gContainer.innerHTML = '<span style="color:#a6adc8;">No groups or modifiers added yet.</span>';
        }

        const pContainer = document.getElementById('planet-container');
        pContainer.innerHTML = appState.planets.length === 0 ? '<span style="color:#a6adc8;">No planets colonized yet.</span>' : '';
        appState.planets.forEach(p => {
            let tOpts = Object.keys(PLANET_DATA).map(t => `<option value="${t}" ${p.type === t ? "selected" : ""}>${t}</option>`).join('');
            let tierOpts = Object.keys(PLANET_DATA[p.type]).map(t => `<option value="${t}" ${p.tier === t ? "selected" : ""}>${t}</option>`).join('');
            let localMods = p.modifiers.map(m => `
                <div class="mod-row" style="border:none; border-left: 2px solid #a6adc8;">
                    <input type="text" value="${m.name}" onchange="updateLocalModifier(${p.id}, ${m.id}, 'name', this.value)" style="width:120px;">
                    <input list="modifier-options" value="${m.type}" onchange="updateLocalModifier(${p.id}, ${m.id}, 'type', this.value)">
                    Val: <input type="number" value="${m.value}" onchange="updateLocalModifier(${p.id}, ${m.id}, 'value', parseFloat(this.value) || 0)">
                    <button class="danger" onclick="removeLocalModifier(${p.id}, ${m.id})">X</button>
                </div>
            `).join('');

            pContainer.innerHTML += `
                <div class="planet-card">
                    <div class="planet-header">
                        <input type="text" value="${p.name}" onchange="updatePlanet(${p.id}, 'name', this.value)" style="font-weight: bold; background: #313244;">
                        <select onchange="updatePlanet(${p.id}, 'type', this.value)">${tOpts}</select>
                        <select onchange="updatePlanet(${p.id}, 'tier', this.value)">${tierOpts}</select>
                        <select onchange="updatePlanet(${p.id}, 'hab', this.value)"><option value="80-100" ${p.hab==="80-100"?"selected":""}>80-100% Hab</option><option value="50-79" ${p.hab==="50-79"?"selected":""}>50-79% Hab</option><option value="0-49" ${p.hab==="0-49"?"selected":""}>0-49% Hab</option></select>
                        Ascension: <input type="number" min="0" max="10" value="${p.asc}" onchange="updatePlanet(${p.id}, 'asc', parseFloat(this.value) || 0)" style="width: 50px;">
                        
                        <div style="display: flex; align-items: center; gap: 5px; background: #181825; padding: 4px 8px; border-radius: 4px; border: 1px solid #45475a;">
                            Output: <input type="number" min="0" value="${p.finalProdMulti !== undefined ? p.finalProdMulti : 100}" onchange="updatePlanet(${p.id}, 'finalProdMulti', parseFloat(this.value) || 0)" style="width: 50px; margin-right: 2px;">%
                        </div>

                        <label class="checkbox-label" title="Checking this stops Global Modifiers from applying to this planet.">
                            <input type="checkbox" onchange="updatePlanet(${p.id}, 'ignoreGlobalMods', this.checked)" ${p.ignoreGlobalMods ? 'checked' : ''}> Ignore Global Mods
                        </label>

                        <button class="danger" onclick="removePlanet(${p.id})" style="margin-left: auto;">Remove</button>
                    </div>
                    <div class="planet-mods">
                        <div style="margin-bottom: 5px; font-size: 0.9em; display:flex; justify-content:space-between;">Local Buffs <button onclick="addLocalModifier(${p.id})" style="padding: 2px 6px;">+ Add</button></div>
                        ${localMods}
                    </div>
                </div>
            `;
        });
    }

    // --- 4. ENGINE MATH ---
    function parseModifier(typeString, value) {
        let str = typeString.toLowerCase().trim();
        let isPct = str.startsWith('%'); let isFlat = str.startsWith('flat');
        if (!isPct && !isFlat) return []; 
        
        let isUpkeep = str.includes('upkeep');
        let resTargetStr = str.substring(isFlat ? 5 : 2).replace('upkeep', '').trim();
        let resTarget = resTargetStr.replace(/ /g, '_');
        
        let targets = resTarget === 'all' ? ALL_RESOURCES : (RESOURCE_TYPES[resTarget] || [resTarget]);
        return targets.map(t => ({ res: t, isPct, value, isUpkeep }));
    }

    function calculateEconomy() {
        let gross = {}; let upkeep = {};
        let turnMods = []; let planetMods = [];

        appState.globalModifiers.forEach(m => {
            if (m.scope === 'turn') turnMods.push(m);
            if (m.scope === 'planet') planetMods.push(m);
        });

        appState.planets.forEach(p => {
            const baseData = PLANET_DATA[p.type] && PLANET_DATA[p.type][p.tier];
            if (!baseData) return;

            let activeBuffs = { prodPct: {}, prodFlat: {}, upkPct: {}, upkFlat: {} };
            function applyToAccumulator(modObj) {
                parseModifier(modObj.type, modObj.value).forEach(mod => {
                    if (mod.isUpkeep) {
                        if (mod.isPct) activeBuffs.upkPct[mod.res] = (activeBuffs.upkPct[mod.res] || 0) + mod.value;
                        else activeBuffs.upkFlat[mod.res] = (activeBuffs.upkFlat[mod.res] || 0) + mod.value;
                    } else {
                        if (mod.isPct) activeBuffs.prodPct[mod.res] = (activeBuffs.prodPct[mod.res] || 0) + mod.value;
                        else activeBuffs.prodFlat[mod.res] = (activeBuffs.prodFlat[mod.res] || 0) + mod.value;
                    }
                });
            }

            p.modifiers.forEach(applyToAccumulator);

            if (!p.ignoreGlobalMods) {
                planetMods.forEach(m => {
                    let matches = (m.target === 'all');
                    if (m.target && m.target.startsWith('type_') && p.type === m.target.substring(5)) matches = true;
                    if (m.target && m.target.startsWith('tier_')) {
                        let pTierNum = parseInt((p.tier.match(/\d+/) || [0])[0]);
                        if (pTierNum >= parseInt(m.target.substring(5))) matches = true;
                    }
                    if (matches) applyToAccumulator(m);
                });
            }

            let habPenalty = p.hab === "0-49" ? 0.70 : (p.hab === "50-79" ? 0.30 : 0);
            const ascBonus = p.asc * 0.05;
            const finalMultiplier = (p.finalProdMulti !== undefined ? p.finalProdMulti : 100) / 100;

            let allProdResources = new Set([...Object.keys(baseData.prod || {}), ...Object.keys(activeBuffs.prodFlat)]);
            allProdResources.forEach(res => {
                let baseAmount = (baseData.prod && baseData.prod[res]) || 0;
                let basePlusFlat = baseAmount + (activeBuffs.prodFlat[res] || 0);
                let pctMultiplier = Math.max(0, 1 - habPenalty + ascBonus + ((activeBuffs.prodPct[res] || 0) / 100));
                gross[res] = (gross[res] || 0) + (basePlusFlat * pctMultiplier * finalMultiplier);
            });
            
            let allUpkResources = new Set([...Object.keys(baseData.upkeep || {}), ...Object.keys(activeBuffs.upkFlat)]);
            allUpkResources.forEach(res => {
                let baseAmount = (baseData.upkeep && baseData.upkeep[res]) || 0;
                let basePlusFlat = baseAmount + (activeBuffs.upkFlat[res] || 0);
                let pctMultiplier = Math.max(0, 1 + ((activeBuffs.upkPct[res] || 0) / 100));
                upkeep[res] = (upkeep[res] || 0) + (basePlusFlat * pctMultiplier);
            });
        });

        turnMods.forEach(m => {
            parseModifier(m.type, m.value).forEach(mod => {
                if (mod.isUpkeep) {
                    if (mod.isPct) upkeep[mod.res] = (upkeep[mod.res] || 0) * (1 + (mod.value / 100));
                    else upkeep[mod.res] = (upkeep[mod.res] || 0) + mod.value; 
                } else {
                    if (mod.isPct) gross[mod.res] = (gross[mod.res] || 0) * (1 + (mod.value / 100));
                    else gross[mod.res] = (gross[mod.res] || 0) + mod.value;
                }
            });
        });

        let sortedResources = Array.from(new Set([...Object.keys(gross), ...Object.keys(upkeep)])).sort();
        if (sortedResources.length === 0) { document.getElementById('output-display').innerHTML = "No active production."; return; }

        let tableHtml = `<table><tr><th>Resource</th><th>Gross Prod</th><th>Total Upkeep</th><th>Net Balance</th></tr>`;
        sortedResources.forEach(res => {
            let pVal = gross[res] || 0; let uVal = upkeep[res] || 0; let netVal = pVal - uVal;
            let formattedName = res.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            let netClass = netVal > 0 ? 'positive' : (netVal < 0 ? 'negative' : 'neutral');
            tableHtml += `<tr><td><b>${formattedName}</b></td><td class="positive">${pVal>0?'+'+pVal.toFixed(1):'-'}</td><td class="negative">${uVal>0?'-'+uVal.toFixed(1):'-'}</td><td class="${netClass}">${netVal>0?'+':''}${netVal.toFixed(1)}</td></tr>`;
        });
        document.getElementById('output-display').innerHTML = tableHtml + `</table>`;
    }

    initDatalist(); renderApp();
</script>
