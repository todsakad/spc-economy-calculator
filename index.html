<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economy Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 20px; }
        .panel { background: #313244; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #89b4fa; border-bottom: 1px solid #45475a; padding-bottom: 10px; }
        button { background: #89b4fa; color: #11111b; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #b4befe; }
        select, input { background: #181825; color: #cdd6f4; border: 1px solid #45475a; padding: 6px; border-radius: 4px; margin-right: 10px; }
        .buff-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .buff-item { display: flex; flex-direction: column; }
        .buff-item label { font-size: 0.9em; margin-bottom: 5px; color: #a6adc8; }
        #output-display { font-family: monospace; white-space: pre-wrap; font-size: 1.1em; color: #a6e3a1; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>Global Empire Modifiers</h2>
        <div class="buff-grid">
            <div class="buff-item">
                <label>Flat Empire Energy (Base Turn Add):</label>
                <input type="number" id="buff-flat-energy" value="0">
            </div>
            <div class="buff-item">
                <label>Flat Empire Minerals (Base Turn Add):</label>
                <input type="number" id="buff-flat-minerals" value="0">
            </div>
            <div class="buff-item">
                <label>% Bonus to Basic (Energy/Min/Food):</label>
                <input type="number" id="buff-pct-basic" value="0" placeholder="e.g. 10 for +10%">
            </div>
            <div class="buff-item">
                <label>% Bonus to Advanced (Alloys/Tech/Unity):</label>
                <input type="number" id="buff-pct-adv" value="0" placeholder="e.g. 15 for +15%">
            </div>
            <div class="buff-item">
                <label>% Bonus to Trade Value:</label>
                <input type="number" id="buff-pct-trade" value="0" placeholder="e.g. 5 for +5%">
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>Planets</h2>
        <button onclick="addPlanet()" style="margin-bottom: 15px;">+ Add Planet</button>
        <div id="planet-container"></div>
    </div>

    <div class="panel">
        <button onclick="calculateEconomy()" style="background: #a6e3a1; width: 100%; font-size: 1.2em; padding: 15px;">Calculate Total Turn Output</button>
        <h2 style="margin-top: 20px;">Results:</h2>
        <div id="output-display">Add a planet and hit calculate!</div>
    </div>

    let planets = [];

    // --- UI LOGIC ---
    function addPlanet() {
        const id = Date.now();
        const firstType = Object.keys(PLANET_DATA)[0];
        const firstTier = Object.keys(PLANET_DATA[firstType])[0];
        
        planets.push({ id, type: firstType, tier: firstTier, hab: "80-100", asc: 0 });
        renderPlanets();
    }

    function updatePlanet(id, field, value) {
        const planet = planets.find(p => p.id === id);
        if (planet) {
            planet[field] = value;
            if (field === 'type') {
                const validTiers = Object.keys(PLANET_DATA[value]);
                if (!validTiers.includes(planet.tier)) {
                    planet.tier = validTiers[0]; 
                }
            }
            renderPlanets();
        }
    }

    function removePlanet(id) {
        planets = planets.filter(p => p.id !== id);
        renderPlanets();
    }

    function renderPlanets() {
        const container = document.getElementById('planet-container');
        container.innerHTML = '';
        
        planets.forEach(p => {
            const div = document.createElement('div');
            div.style.marginBottom = '15px';
            div.style.padding = '10px';
            div.style.background = '#181825';
            div.style.borderRadius = '5px';
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            div.style.flexWrap = 'wrap';
            div.style.gap = '10px';
            
            let typeOptions = Object.keys(PLANET_DATA).map(type => 
                `<option value="${type}" ${p.type === type ? "selected" : ""}>${type}</option>`
            ).join('');
            
            let tierOptions = Object.keys(PLANET_DATA[p.type]).map(tier => 
                `<option value="${tier}" ${p.tier === tier ? "selected" : ""}>${tier}</option>`
            ).join('');

            div.innerHTML = `
                <select onchange="updatePlanet(${p.id}, 'type', this.value)">
                    ${typeOptions}
                </select>
                <select onchange="updatePlanet(${p.id}, 'tier', this.value)">
                    ${tierOptions}
                </select>
                <select onchange="updatePlanet(${p.id}, 'hab', this.value)">
                    <option value="80-100" ${p.hab==="80-100"?"selected":""}>80-100% Hab</option>
                    <option value="50-79" ${p.hab==="50-79"?"selected":""}>50-79% Hab</option>
                    <option value="0-49" ${p.hab==="0-49"?"selected":""}>0-49% Hab</option>
                </select>
                <label style="font-size: 0.9em; margin-left: auto;">Ascension:</label>
                <input type="number" min="0" max="10" value="${p.asc}" onchange="updatePlanet(${p.id}, 'asc', parseFloat(this.value) || 0)" style="width: 50px; margin-right: 0;">
                <button onclick="removePlanet(${p.id})" style="background: #f38ba8; color: #11111b; margin-left: 10px;">X</button>
            `;
            container.appendChild(div);
        });
    }

    // --- CALCULATION ENGINE ---
    function calculateEconomy() {
        const buffs = {
            flatEnergy: parseFloat(document.getElementById('buff-flat-energy').value) || 0,
            flatMinerals: parseFloat(document.getElementById('buff-flat-minerals').value) || 0,
            pctBasic: (parseFloat(document.getElementById('buff-pct-basic').value) || 0) / 100,
            pctAdv: (parseFloat(document.getElementById('buff-pct-adv').value) || 0) / 100,
            pctTrade: (parseFloat(document.getElementById('buff-pct-trade').value) || 0) / 100
        };

        let totalOutput = {};

        // Calculate Planet Production & Upkeep
        planets.forEach(p => {
            const baseData = PLANET_DATA[p.type] && PLANET_DATA[p.type][p.tier];
            if (!baseData) return;

            let habPenalty = 0;
            if (p.hab === "0-49") { habPenalty = 0.70; }
            if (p.hab === "50-79") { habPenalty = 0.30; }
            
            const ascBonus = p.asc * 0.05;

            // Process Production
            if (baseData.prod) {
                for (const [res, amount] of Object.entries(baseData.prod)) {
                    let isBasic = RESOURCE_TYPES.basic.includes(res);
                    let isAdv = RESOURCE_TYPES.advanced.includes(res);
                    let isTrade = RESOURCE_TYPES.trade.includes(res);

                    let pctBonus = 0;
                    if (isBasic) pctBonus = buffs.pctBasic;
                    if (isAdv) pctBonus = buffs.pctAdv;
                    if (isTrade) pctBonus = buffs.pctTrade;

                    // Multiplier = Base (1.0) - Habitability Penalty + Ascension Bonus + Buffs
                    // Note: Habitability penalty doesn't usually apply to Trade in normal Stellaris rules, 
                    // but I'm keeping the math uniform here unless you want it excluded.
                    let multiplier = 1 - habPenalty + ascBonus + pctBonus;
                    if (multiplier < 0) multiplier = 0; // Prevent negative production loops

                    totalOutput[res] = (totalOutput[res] || 0) + (amount * multiplier);
                }
            }

            // Process Upkeep (Usually unaffected by production buffs)
            if (baseData.upkeep) {
                for (const [res, amount] of Object.entries(baseData.upkeep)) {
                    totalOutput[res] = (totalOutput[res] || 0) - amount;
                }
            }
        });

        // Apply Empire Flat Buffs (e.g. Dyson spheres, base stations)
        if (totalOutput['energy'] !== undefined || buffs.flatEnergy > 0) {
            totalOutput['energy'] = (totalOutput['energy'] || 0) + buffs.flatEnergy;
        }
        if (totalOutput['minerals'] !== undefined || buffs.flatMinerals > 0) {
            totalOutput['minerals'] = (totalOutput['minerals'] || 0) + buffs.flatMinerals;
        }

        // Render Output
        let outputString = "";
        const sortedResources = Object.keys(totalOutput).sort();
        
        if (sortedResources.length === 0) {
            outputString = "No planets added yet.";
        } else {
            sortedResources.forEach(res => {
                let formattedName = res.replace('_', ' ').toUpperCase();
                let val = totalOutput[res];
                // Color formatting for positives and negatives
                let color = val >= 0 ? '#a6e3a1' : '#f38ba8'; 
                let sign = val >= 0 ? '+' : '';
                outputString += `<span style="color: ${color}">${formattedName}: ${sign}${val.toFixed(2)}</span>\n`;
            });
        }
        
        document.getElementById('output-display').innerHTML = outputString;
    }
</script>
