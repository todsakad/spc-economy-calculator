<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economy Calculator V3</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 20px; max-width: 1200px; margin: auto; }
        .panel { background: #313244; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: #89b4fa; border-bottom: 1px solid #45475a; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #89b4fa; color: #11111b; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #b4befe; }
        button.danger { background: #f38ba8; }
        button.danger:hover { background: #eba0ac; }
        button.success { background: #a6e3a1; color: #11111b; font-size: 1.1em; padding: 12px; width: 100%; }
        button.success:hover { background: #94e2d5; }
        
        select, input { background: #181825; color: #cdd6f4; border: 1px solid #45475a; padding: 6px; border-radius: 4px; margin-right: 10px; }
        input[type="text"] { width: 150px; }
        input[type="number"] { width: 70px; }

        .mod-row { display: flex; align-items: center; background: #181825; padding: 8px; border-radius: 4px; margin-bottom: 8px; gap: 10px; }
        
        .planet-card { background: #45475a; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 5px solid #89b4fa; }
        .planet-header { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
        .planet-mods { background: #313244; padding: 10px; border-radius: 4px; margin-top: 10px; }
        
        .header-actions { display: flex; gap: 10px; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #181825; border-radius: 6px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #313244; }
        th { background: #45475a; color: #cdd6f4; }
        .positive { color: #a6e3a1; font-weight: bold; }
        .negative { color: #f38ba8; font-weight: bold; }
        .neutral { color: #cdd6f4; }
    </style>
</head>
<body>

    <div class="header-actions">
        <button onclick="saveData()">💾 Save Configuration</button>
        <button onclick="document.getElementById('file-upload').click()">📂 Load Configuration</button>
        <input type="file" id="file-upload" style="display:none" accept=".json" onchange="loadData(event)">
    </div>

    <div class="panel">
        <h2>Global Modifiers <button onclick="addGlobalModifier()">+ Add Global Mod</button></h2>
        <div id="global-mods-container"></div>
    </div>

    <div class="panel">
        <h2>Empire Planets <button onclick="addPlanet()">+ Add Planet</button></h2>
        <div id="planet-container"></div>
    </div>

    <div class="panel" style="background: #1e1e2e; border: 2px solid #89b4fa;">
        <button class="success" onclick="calculateEconomy()">Calculate Total Economy</button>
        <h2 style="margin-top: 20px; border-bottom: none;">Ledger Results:</h2>
        <div id="output-display">Add planets and modifiers, then hit calculate!</div>
    </div>

    let appState = {
        globalModifiers: [],

    // --- STATE MANAGEMENT ---
    function saveData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "empire_economy.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function loadData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                appState = JSON.parse(e.target.result);
                renderApp();
            } catch (err) {
                alert("Error loading file. Make sure it's a valid JSON configuration.");
            }
        };
        reader.readAsText(file);
    }

    // --- MODIFIER LOGIC ---
    function addGlobalModifier() {
        appState.globalModifiers.push({ id: Date.now(), name: "New Buff", type: "pct_basic", value: 0 });
        renderApp();
    }

    function updateGlobalModifier(id, field, value) {
        const mod = appState.globalModifiers.find(m => m.id === id);
        if (mod) mod[field] = value;
        renderApp();
    }

    function removeGlobalModifier(id) {
        appState.globalModifiers = appState.globalModifiers.filter(m => m.id !== id);
        renderApp();
    }

    function addLocalModifier(planetId) {
        const p = appState.planets.find(p => p.id === planetId);
        if (p) {
            p.modifiers.push({ id: Date.now(), name: "Local Buff", type: "pct_basic", value: 0 });
            renderApp();
        }
    }

    function updateLocalModifier(planetId, modId, field, value) {
        const p = appState.planets.find(p => p.id === planetId);
        if (p) {
            const mod = p.modifiers.find(m => m.id === modId);
            if (mod) mod[field] = value;
            renderApp();
        }
    }

    function removeLocalModifier(planetId, modId) {
        const p = appState.planets.find(p => p.id === planetId);
        if (p) {
            p.modifiers = p.modifiers.filter(m => m.id !== modId);
            renderApp();
        }
    }

    // --- PLANET LOGIC ---
    function addPlanet() {
        const id = Date.now();
        const firstType = Object.keys(PLANET_DATA)[0];
        const firstTier = Object.keys(PLANET_DATA[firstType])[0];
        
        appState.planets.push({ id, name: "New Planet", type: firstType, tier: firstTier, hab: "80-100", asc: 0, modifiers: [] });
        renderApp();
    }

    function updatePlanet(id, field, value) {
        const planet = appState.planets.find(p => p.id === id);
        if (planet) {
            planet[field] = value;
            if (field === 'type') {
                const validTiers = Object.keys(PLANET_DATA[value]);
                if (!validTiers.includes(planet.tier)) planet.tier = validTiers[0]; 
            }
            renderApp();
        }
    }

    function removePlanet(id) {
        appState.planets = appState.planets.filter(p => p.id !== id);
        renderApp();
    }

    // --- RENDERING UI ---
    function buildModifierSelect(currentValue) {
        return Object.entries(MODIFIER_TYPES).map(([val, label]) => 
            `<option value="${val}" ${currentValue === val ? 'selected' : ''}>${label}</option>`
        ).join('');
    }

    function renderApp() {
        // 1. Render Global Mods
        const gContainer = document.getElementById('global-mods-container');
        gContainer.innerHTML = appState.globalModifiers.length === 0 ? '<span style="color:#a6adc8;">No global modifiers active.</span>' : '';
        appState.globalModifiers.forEach(m => {
            gContainer.innerHTML += `
                <div class="mod-row">
                    <input type="text" value="${m.name}" onchange="updateGlobalModifier(${m.id}, 'name', this.value)">
                    <select onchange="updateGlobalModifier(${m.id}, 'type', this.value)">${buildModifierSelect(m.type)}</select>
                    Value: <input type="number" value="${m.value}" onchange="updateGlobalModifier(${m.id}, 'value', parseFloat(this.value) || 0)">
                    <button class="danger" onclick="removeGlobalModifier(${m.id})">X</button>
                </div>
            `;
        });

        // 2. Render Planets
        const pContainer = document.getElementById('planet-container');
        pContainer.innerHTML = appState.planets.length === 0 ? '<span style="color:#a6adc8;">No planets colonized yet.</span>' : '';
        
        appState.planets.forEach(p => {
            let typeOptions = Object.keys(PLANET_DATA).map(type => `<option value="${type}" ${p.type === type ? "selected" : ""}>${type}</option>`).join('');
            let tierOptions = Object.keys(PLANET_DATA[p.type]).map(tier => `<option value="${tier}" ${p.tier === tier ? "selected" : ""}>${tier}</option>`).join('');

            let localModsHtml = p.modifiers.map(m => `
                <div class="mod-row">
                    <input type="text" value="${m.name}" onchange="updateLocalModifier(${p.id}, ${m.id}, 'name', this.value)" style="width:120px;">
                    <select onchange="updateLocalModifier(${p.id}, ${m.id}, 'type', this.value)">${buildModifierSelect(m.type)}</select>
                    Value: <input type="number" value="${m.value}" onchange="updateLocalModifier(${p.id}, ${m.id}, 'value', parseFloat(this.value) || 0)">
                    <button class="danger" onclick="removeLocalModifier(${p.id}, ${m.id})">X</button>
                </div>
            `).join('');

            pContainer.innerHTML += `
                <div class="planet-card">
                    <div class="planet-header">
                        <input type="text" value="${p.name}" onchange="updatePlanet(${p.id}, 'name', this.value)" placeholder="Planet Name" style="font-weight: bold; background: #313244;">
                        <select onchange="updatePlanet(${p.id}, 'type', this.value)">${typeOptions}</select>
                        <select onchange="updatePlanet(${p.id}, 'tier', this.value)">${tierOptions}</select>
                        <select onchange="updatePlanet(${p.id}, 'hab', this.value)">
                            <option value="80-100" ${p.hab==="80-100"?"selected":""}>80-100% Hab</option>
                            <option value="50-79" ${p.hab==="50-79"?"selected":""}>50-79% Hab</option>
                            <option value="0-49" ${p.hab==="0-49"?"selected":""}>0-49% Hab</option>
                        </select>
                        <label style="font-size: 0.9em;">Ascension:</label>
                        <input type="number" min="0" max="10" value="${p.asc}" onchange="updatePlanet(${p.id}, 'asc', parseFloat(this.value) || 0)" style="width: 50px;">
                        <button class="danger" onclick="removePlanet(${p.id})" style="margin-left: auto;">Remove</button>
                    </div>
                    <div class="planet-mods">
                        <div style="margin-bottom: 10px; font-size: 0.9em; color: #a6adc8; display: flex; justify-content: space-between; align-items: center;">
                            Local Modifiers <button onclick="addLocalModifier(${p.id})" style="padding: 4px 8px; font-size: 0.8em;">+ Add Buff</button>
                        </div>
                        ${localModsHtml || '<span style="font-size: 0.8em; color: #6c7086;">No local buffs.</span>'}
                    </div>
                </div>
            `;
        });
    }

    // --- CALCULATION ENGINE ---
    function calculateEconomy() {
        let gross = {};
        let upkeep = {};

        // Aggregate Global Buffs
        let gBuffs = { pct_basic: 0, pct_adv: 0, pct_trade: 0, pct_all: 0, flat_energy: 0, flat_minerals: 0 };
        appState.globalModifiers.forEach(m => { gBuffs[m.type] += m.value; });

        // Calculate Planets
        appState.planets.forEach(p => {
            const baseData = PLANET_DATA[p.type] && PLANET_DATA[p.type][p.tier];
            if (!baseData) return;

            // Aggregate Local Buffs for this planet
            let lBuffs = { pct_basic: 0, pct_adv: 0, pct_trade: 0, pct_all: 0, flat_energy: 0, flat_minerals: 0 };
            p.modifiers.forEach(m => { lBuffs[m.type] += m.value; });

            let habPenalty = 0;
            if (p.hab === "0-49") habPenalty = 0.70;
            if (p.hab === "50-79") habPenalty = 0.30;
            const ascBonus = p.asc * 0.05;

            // Apply Base Production + Modifiers
            if (baseData.prod) {
                for (const [res, amount] of Object.entries(baseData.prod)) {
                    let isBasic = RESOURCE_TYPES.basic.includes(res);
                    let isAdv = RESOURCE_TYPES.advanced.includes(res);
                    let isTrade = RESOURCE_TYPES.trade.includes(res);

                    let pctBonus = gBuffs.pct_all + lBuffs.pct_all;
                    if (isBasic) pctBonus += (gBuffs.pct_basic + lBuffs.pct_basic);
                    if (isAdv) pctBonus += (gBuffs.pct_adv + lBuffs.pct_adv);
                    if (isTrade) pctBonus += (gBuffs.pct_trade + lBuffs.pct_trade);

                    let multiplier = 1 - habPenalty + ascBonus + (pctBonus / 100);
                    if (multiplier < 0) multiplier = 0;

                    gross[res] = (gross[res] || 0) + (amount * multiplier);
                }
            }

            // Apply Upkeep (Untouched by standard production modifiers)
            if (baseData.upkeep) {
                for (const [res, amount] of Object.entries(baseData.upkeep)) {
                    upkeep[res] = (upkeep[res] || 0) + amount;
                }
            }

            // Apply Local Flat Buffs
            if (lBuffs.flat_energy > 0) gross['energy'] = (gross['energy'] || 0) + lBuffs.flat_energy;
            if (lBuffs.flat_minerals > 0) gross['minerals'] = (gross['minerals'] || 0) + lBuffs.flat_minerals;
        });

        // Apply Global Flat Buffs
        if (gBuffs.flat_energy > 0) gross['energy'] = (gross['energy'] || 0) + gBuffs.flat_energy;
        if (gBuffs.flat_minerals > 0) gross['minerals'] = (gross['minerals'] || 0) + gBuffs.flat_minerals;

        // Render Ledger Table
        const allResources = new Set([...Object.keys(gross), ...Object.keys(upkeep)]);
        let sortedResources = Array.from(allResources).sort();

        if (sortedResources.length === 0) {
            document.getElementById('output-display').innerHTML = "No active production or upkeep.";
            return;
        }

        let tableHtml = `
            <table>
                <tr>
                    <th>Resource</th>
                    <th>Gross Production</th>
                    <th>Total Upkeep</th>
                    <th>Net Balance</th>
                </tr>
        `;

        sortedResources.forEach(res => {
            let pVal = gross[res] || 0;
            let uVal = upkeep[res] || 0;
            let netVal = pVal - uVal;

            let formattedName = res.replace('_', ' ').toUpperCase();
            let netClass = netVal > 0 ? 'positive' : (netVal < 0 ? 'negative' : 'neutral');
            let netSign = netVal > 0 ? '+' : '';

            tableHtml += `
                <tr>
                    <td style="font-weight: bold;">${formattedName}</td>
                    <td class="positive">${pVal > 0 ? '+' + pVal.toFixed(1) : '-'}</td>
                    <td class="negative">${uVal > 0 ? '-' + uVal.toFixed(1) : '-'}</td>
                    <td class="${netClass}">${netSign}${netVal.toFixed(1)}</td>
                </tr>
            `;
        });

        tableHtml += `</table>`;
        document.getElementById('output-display').innerHTML = tableHtml;
    }

    // Initialize the app empty
    renderApp();
</script>
</body>
</html>
